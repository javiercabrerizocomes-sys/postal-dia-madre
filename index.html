{ "version": "0.8.2594.39678" }
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliz Día de la Madre</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .card {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      color: #ff4d6d;
      font-size: 2.5em;
    }

    p {
      font-size: 1.2em;
      color: #333;
    }

    .heart {
      font-size: 40px;
      animation: pulse 1.5s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    .flowers {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .flower {
      position: absolute;
      font-size: 24px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-100px); opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="flowers" id="flowers"></div>

<div class="card">
  <h1>🌸 ¡Feliz Día de la Madre! 🌸</h1>
  <p>
    Hoy celebramos a todas las madres del mundo 🌍💖<br><br>
    Gracias por vuestro amor, vuestra fuerza y todo lo que hacéis cada día.
  </p>
  <div class="heart">💖</div>
</div>

<script>
  const flowersContainer = document.getElementById('flowers');

  function createFlower() {
    const flower = document.createElement('div');
    flower.classList.add('flower');
    flower.innerHTML = '🌸';
    flower.style.left = Math.random() * 100 + 'vw';
    flower.style.animationDuration = (3 + Math.random() * 5) + 's';
    flowersContainer.appendChild(flower);

    setTimeout(() => {
      flower.remove();
    }, 8000);
  }

  setInterval(createFlower, 300);
</script>

</body>
</html>
